<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Game NRZ-Inverted</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#2c5364);
color:white;
text-align:center;
}

.box{
background:white;
color:black;
width:900px;
margin:auto;
padding:20px;
border-radius:20px;
}

canvas{
border:2px solid black;
margin:20px;
}

input,button{
padding:10px;
font-size:16px;
margin:5px;
}

#leaderboard{
margin-top:20px;
text-align:left;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
border:1px solid #ccc;
padding:5px;
}

</style>
</head>

<body>

<h1>Game NRZ-Inverted</h1>

<div class="box">

<div id="login">

<h2>Masukkan Nama</h2>

<input id="nameInput" placeholder="Nama siswa">
<br>
<button onclick="startGame()">Mulai Game</button>

</div>

<div id="game" style="display:none">

<h3 id="player"></h3>

<div id="score">Skor : 0</div>
<div id="level">Level : 1</div>
<div id="progress">Progress Level : 0 / 5</div>
<div id="lives">Nyawa : ❤️❤️❤️</div>

<canvas id="canvas" width="800" height="200"></canvas>

<div>
<input id="answer" placeholder="Masukkan bit contoh: 10101">
<button onclick="checkAnswer()">Jawab</button>
</div>

<div id="result"></div>

<button onclick="saveScore()">Simpan Skor</button>

</div>

<div id="leaderboard">

<h2>Leaderboard</h2>

<table>
<thead>
<tr>
<th>Nama</th>
<th>Skor</th>
</tr>
</thead>
<tbody id="leaderboardBody"></tbody>
</table>

</div>

</div>

<script>

/* =========================
SETTING GOOGLE FORM
========================= */

const FORM_URL="https://docs.google.com/forms/d/e/1FAIpQLSeu9Wa2Py0d-6KlDf2NwXlZuooonPHttFY-fhdAx3Bh3RVe8A/formResponse"
const SHEET_CSV_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRsbWmgt1YA35qac-LRnQhchCaurt2WkbxkWIv6DVELyrWwjix2WmZelQvdXb1GD-CpgdMBrVUPSQpF/pub?output=csv"

/* =========================
VARIABEL GAME
========================= */

let player=""
let score=0
let lives=3
let level=1
let correctCount=0
let data=""

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

/* =========================
START GAME
========================= */

function startGame(){

player=document.getElementById("nameInput").value

if(player==""){
alert("Masukkan nama")
return
}

document.getElementById("login").style.display="none"
document.getElementById("game").style.display="block"

document.getElementById("player").innerText="Pemain : "+player

updateLives()
updateScore()
updateLevel()

newQuestion()

}

/* =========================
UPDATE UI
========================= */

function updateScore(){
document.getElementById("score").innerText="Skor : "+score
}

function updateLives(){

let hearts=""

for(let i=0;i<lives;i++) hearts+="❤️"

document.getElementById("lives").innerText="Nyawa : "+hearts

}

function updateLevel(){

document.getElementById("level").innerText="Level : "+level
document.getElementById("progress").innerText="Progress Level : "+correctCount+" / 5"

}

/* =========================
GENERATE DATA
========================= */

function generateBits(n){

let s=""

for(let i=0;i<n;i++)
s+=Math.random()<0.5?"0":"1"

return s

}

/* =========================
GAMBAR NRZ INVERTED
========================= */

function drawNRZ(bits){

ctx.clearRect(0,0,canvas.width,canvas.height)

let x=50
let yHigh=50
let yLow=150

let levelSignal=yLow

for(let i=0;i<bits.length;i++){

let bit=bits[i]

if(bit=="1"){

levelSignal=(levelSignal==yHigh)?yLow:yHigh

}

let y=levelSignal

ctx.beginPath()
ctx.moveTo(x,y)
ctx.lineTo(x+60,y)
ctx.stroke()

ctx.fillText(bit,x+25,180)

x+=60

}

}

/* =========================
SOAL BARU
========================= */

function newQuestion(){

let length

if(level==1) length=8
else if(level==2) length=10
else length=12

data=generateBits(length)

drawNRZ(data)

document.getElementById("answer").value=""
document.getElementById("result").innerText=""

}

/* =========================
CEK JAWABAN
========================= */

function checkAnswer(){

let ans=document.getElementById("answer").value

if(ans===data){

score+=10
correctCount++

updateScore()
updateLevel()

document.getElementById("result").innerHTML="<span style='color:green'>Benar!</span>"

if(correctCount>=5){

correctCount=0

if(level<3){

level++

document.getElementById("result").innerHTML="<span style='color:blue'>Naik ke Level "+level+"</span>"

updateLevel()

setTimeout(newQuestion,1500)

return

}

}

setTimeout(newQuestion,1000)

}else{

lives--

updateLives()

document.getElementById("result").innerHTML="<span style='color:red'>Salah!</span>"

if(lives<=0){

alert("Game Over! Skor: "+score)

saveScore()

}else{

setTimeout(newQuestion,1000)

}

}

}

/* =========================
SIMPAN KE GOOGLE FORM
========================= */

function saveScore(){

let formData=new FormData()

formData.append("entry.1228095246",player)
formData.append("entry.1297821195",score)

fetch(FORM_URL,{
method:"POST",
mode:"no-cors",
body:formData
})

alert("Skor berhasil dikirim!")

}

/* =========================
LEADERBOARD ONLINE
========================= */

async function loadLeaderboard(){

try{

let res=await fetch(SHEET_CSV_URL)

let text=await res.text()

let rows=text.split("\n").slice(1)

let data=[]

rows.forEach(r=>{

let c=r.split(",")

if(c.length>=2){

data.push({
name:c[0],
score:parseInt(c[1])
})

}

})

data.sort((a,b)=>b.score-a.score)

let html=""

data.slice(0,10).forEach(d=>{

html+=`<tr>
<td>${d.name}</td>
<td>${d.score}</td>
</tr>`

})

document.getElementById("leaderboardBody").innerHTML=html

}catch(e){

console.log(e)

}

}

loadLeaderboard()

</script>

</body>
</html>
